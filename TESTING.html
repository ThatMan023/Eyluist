<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Dashboard Showcase</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
 
  <link rel="stylesheet" href="style_Chars.css">


</head>
<body>
 
  <div id="character-showcase-root"></div>

  <script>
    // =========================================================================
    // Updated data structure to include a `cardLink` for the whole tile.
    const CHARACTERS_CONFIG = [
      {
        id: 'rook',
        charName: 'rook',
        intGender: 'female',
        imageName: 'Rook_CallingCard.png', 
        cardLink: 'https://www.ign.com/characters/rook-dragon-age', // Sample card link
        dob: 'June 27th, 2074',
        crimID: '67VJ.71GV - 68UP.35.4FP',
        status: 'okay',
        statusColor: '#ABFFC1',
        description: '<p>THATMAN WILL ADD INFO HERE</p>',
        csvName: 'https://thatman023.github.io/Eyluist/characters/Rook_Chips.csv' // Update for your new data
      }
    ];
    // =========================================================================

    document.addEventListener("DOMContentLoaded", () => {
      renderShowcaseCards();
      loadAllChips();
    });

    function renderShowcaseCards() {
      const targetElement = document.getElementById('character-showcase-root');
      let combinedHTML = "";

      CHARACTERS_CONFIG.forEach(char => {
        const genderClean = char.intGender.toLowerCase();
        
        // Wrapped entire content to handle the invisible overlay link.
        combinedHTML += `

                <div class="charDescriptionText">
                  <div class="charDetails">
                    <div class="detail-item">
                      <span class="label">Date of Birth</span>
                      <div class="separator"></div>
                      <span class="value">${char.dob}</span>
                    </div> 
                    <div class="detail-item">
                      <span class="label">Crimsoft ID</span>
                      <div class="separator"></div> 
                      <span class="value">${char.crimID}</span>
                    </div> 
                    <div class="detail-item"> 
                      <span class="label">Status</span>
                      <div class="separator"></div> 
                      <span class="value" style="color:${char.statusColor}">${char.status}</span>
                    </div>
                  </div>
                  
                  <div id="chip-target-${char.id}" class="trait-container"></div>
                  
                  <div class="charInfoBlock">${char.description}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      targetElement.innerHTML = combinedHTML;
    }

    async function loadAllChips() {
      for (const char of CHARACTERS_CONFIG) {
        await fetchAndRenderChips(char);
      }
    }

    async function fetchAndRenderChips(character) {
      const chipContainer = document.getElementById(`chip-target-${character.id}`);
      if (!chipContainer) return;

      try {
        const response = await fetch(character.csvName);
        if (!response.ok) throw new Error(`HTTP network error: status ${response.status}`);
        
        const csvRawData = await response.text();
        const rows = csvRawData.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");

        rows.forEach(row => {
          const [title, icon, color, link] = row.split(',').map(item => item ? item.trim() : '');
          if (!title) return; 
          
          const chip = document.createElement(link ? 'a' : 'div');
          
          if (link) {
            chip.href = link;
            chip.target = "_blank"; 
            chip.style.cursor = "pointer";
          }

          chip.classList.add('trait-chip');
          chip.style.setProperty('--icon-color', color || '#555');
          
          chip.innerHTML = `
            <div class="trait-icon material-symbols-outlined" style="background-color: ${color || '#555'}">${icon || 'label'}</div>
            <span>${title.toUpperCase()}</span>
          `;
          
          chipContainer.appendChild(chip);
        });
      } catch (error) {
        console.error(`Could not read CSV data for ${character.charName}:`, error);
        chipContainer.innerHTML = "<small style='color:#ff5983; font-weight: bold;'>NO DATA</small>";
      }
    }
  </script>
</body>
</html>
