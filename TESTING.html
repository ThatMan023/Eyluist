<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <style>
    :root {
      --bg-color: #1a1a1a;
      --container-bg: #131313;
      --text-color: #ffffff;
      --gender-color: #ffffff;
      --chip-bg: #2d2d2d;
      --main-font: 'Inter', sans-serif;
      --chip-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Auto Gender Colors */
    [data-gender="male"] { --gender-color: #2B95FF; }
    [data-gender="female"] { --gender-color: #ff5983; }

    body {
      background-color: #000;
      color: var(--text-color);
      margin: 0;
      display: flex;
      justify-content: center; 
      align-items: center;     
      min-height: 100vh;       
      padding: 20px;
      box-sizing: border-box;
      font-family: var(--main-font);
    }

    .charMainContainer {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 30px;
      width: 100%;
      max-width: 1100px;
      min-height: 400px;
      background: var(--container-bg);
      padding: 25px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      margin: auto; 
    }

    /* --- LEFT SIDE: PROFILE PICTURE --- */
    .charContainerLeft {
      flex: 0 0 35%;
      max-width: 400px;
      border-radius: 25px;
      overflow: hidden;
      position: relative;
    }

    .charImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      user-select: none;
      display: block;
    }

    .charImage:hover {
      transform: scale(1.05);
    }

    .genderSelect {
      color: var(--gender-color);
      text-shadow: 0 0 15px var(--gender-color);
      background: rgba(25, 25, 25, 0.4);
      box-shadow: 0px 0px 5px 1px rgba(255, 255, 255, 0.5);
      padding: 10px;
      margin: 15px;
      position: absolute;
      top: 0;
      right: 0;
      z-index: 10;
      font-size: 2.5rem;
      border-radius: 50%;
      backdrop-filter: blur(4px);
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 45px;
      height: 45px;
    }

    /* --- RIGHT SIDE: DESCRIPTION AREA --- */
    .charContainerRight {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .charTitle {
      text-align: center;
      font-size: 5.5rem;
      margin: 10px;
      padding: 15px;
      text-transform: uppercase;
      font-family: 'Oswald', sans-serif;
    }

    .titleSeparator {
      width: 70%;
      height: 1px;
      border: none;
      background: linear-gradient(to right, transparent, #555, transparent);
      margin: 0 auto 20px auto;
    }

    /* --- CHIPS --- */
    .trait-container {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 15px;
      user-select: none;
    }

    .trait-chip {
      display: flex;
      align-items: center;
      background-color: var(--chip-bg);
      color: var(--text-color);
      padding: 4px 14px 4px 4px;
      border-radius: 50px;
      font-family: var(--chip-font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      width: fit-content;
      transition: all 0.2s ease;
      border: 1px solid var(--icon-color, #555);
      white-space: nowrap;
      text-decoration: none;
    }

    .trait-chip:hover {
      transform: translateY(-3px);
      background-color: #3d3d3d;
    }

    .trait-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background-color: var(--icon-color, #555);
      color: white;
      border-radius: 50%;
      margin-right: 12px;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* --- TEXT DESCRIPTION --- */
    .charDescriptionText {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #cccccc;
      text-align: justify;
      margin: auto 0;
    }

    .charDetails {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 30px;
      font-family: 'Cascadia Code', Consolas, monospace; 
      text-transform: uppercase;
    }

    .detail-item {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
    }

    .label {
      width: 120px; 
      font-weight: bold;
      color: #888; 
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    .separator {
      width: 2px;
      height: 16px;
      background-color: #444; 
      margin: 0 15px;
    }

    .value {
      color: #fff; 
      font-weight: 500;
    }

    /* --- ICON STYLES --- */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }
    .genderSelect.material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 350, 'GRAD' 0, 'opsz' 24;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 800px) {
      .charMainContainer {
        flex-direction: column;
      }
      .charContainerLeft {
        flex: none;
        width: 100%;
        max-width: 100%;
        height: 400px;
      }
      .charTitle {
        font-size: 3.5rem;
      }
    }
  </style>
</head>
<body>

  <div id="character-view-root"></div>

  <script>
    // =========================================================================
    const CHARACTER_CONFIG = {
      charName: 'rook',
      intGender: 'female',
      imageName: 'characters/Rook_CallingCard.png', 
      dob: 'June 27th, 2074',
      crimID: '67VJ.71GV - 68UP.35.4FP',
      status: 'okay',
      statusColor: '#ABFFC1',
      description: '<p>THATMAN WILL ADD INFO HERE</p>',
      csvName: 'https://raw.githack.com/ThatMan023/Eyluist/1ed2758977c9920ca2d44d2f0306ed1f3965e263/characters/Rook_Chips.csv'
    };
    // =========================================================================

    document.addEventListener("DOMContentLoaded", () => {
      renderProfileCard();
      loadChips();
    });

    function renderProfileCard() {
      const targetElement = document.getElementById('character-view-root');
      const genderClean = CHARACTER_CONFIG.intGender.toLowerCase();
      
      targetElement.innerHTML = `
        <div class="charMainContainer" data-gender="${genderClean}">
          <div class="charContainerLeft">
            <img class="charImage" src="${CHARACTER_CONFIG.imageName}" alt="${CHARACTER_CONFIG.charName}">
            <span data-gender="${genderClean}" class="genderSelect material-symbols-outlined" id="textGender">
              ${genderClean === 'female' ? 'female' : 'male'}
            </span>
          </div>
          <div class="charContainerRight">
            <h1 class="charTitle">${CHARACTER_CONFIG.charName}</h1>
            <hr class="titleSeparator">
                
            <div id="chip-target" class="trait-container"></div>
            
            <div class="charDescriptionText">
              <div class="charDetails">
                <div class="detail-item">
                  <span class="label">Date of Birth</span>
                  <div class="separator"></div>
                  <span class="value">${CHARACTER_CONFIG.dob}</span>
                </div> 
                <div class="detail-item">
                  <span class="label">Crimsoft ID</span>
                  <div class="separator"></div> 
                  <span class="value">${CHARACTER_CONFIG.crimID}</span>
                </div> 
                <div class="detail-item"> 
                  <span class="label">Status</span>
                  <div class="separator"></div> 
                  <span class="value" style="color:${CHARACTER_CONFIG.statusColor}">${CHARACTER_CONFIG.status}</span>
                </div>
              </div>
              <div>${CHARACTER_CONFIG.description}</div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadChips() {
      const chipContainer = document.getElementById('chip-target');
      if (!chipContainer) return;

      try {
        const response = await fetch(CHARACTER_CONFIG.csvName);
        if (!response.ok) throw new Error(`HTTP network error: status ${response.status}`);
        
        const csvRawData = await response.text();

        // Optimized Fix: Handles \r\n line break encoding perfectly to prevent broken URL strings
        const rows = csvRawData.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");

        rows.forEach(row => {
          const [title, icon, color, link] = row.split(',').map(item => item ? item.trim() : '');
          if (!title) return; 
          
          const chip = document.createElement(link ? 'a' : 'div');
          
          if (link) {
            chip.href = link;
            chip.target = "_blank"; 
            chip.style.cursor = "pointer";
          }

          chip.classList.add('trait-chip');
          chip.style.setProperty('--icon-color', color || '#555');
          
          chip.innerHTML = `
            <div class="trait-icon material-symbols-outlined" style="background-color: ${color || '#555'}">${icon || 'label'}</div>
            <span>${title.toUpperCase()}</span>
          `;
          
          chipContainer.appendChild(chip);
        });
      } catch (error) {
        console.error("Could not read CSV data file source:", error);
        chipContainer.innerHTML = "<small style='color:#ff5983;'>CSV ERROR</small>";
      }
    }
  </script>
</body>
</html>
