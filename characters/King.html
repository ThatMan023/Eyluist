<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Profile</title>
    <style>
        /* Basic styling to ensure the container is visible */
        #header-container { margin: 20px; }
        .trait-chip { display: inline-flex; align-items: center; margin: 5px; padding: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <script>
        // 1. UNIQUE CHARACTER DATA
        const cardData = {
            name: "king",
            logoUrl: "https://github.com/ThatMan023/Eyluist/blob/main/characters/King_CallingCard.png?raw=true",
            csvFile: "https://raw.githack.com/ThatMan023/Eyluist/8cdf9053191725f1c512ebc4c5fcd7a636853de9/characters/King_Chips.csv",
            gender: "male",
            genderColor: "#2B95FF",
			//  		F :  #ff5983			M : #2B95FF
            dob: "November 7th, 2070",
            crimsoftId: "90DA.33AO - 27ZY.70.9JL",
            status: "Okay",
            statusColor: "#ABFFC1",
            description: "THATMAN WILL ADD INFO HERE"
        };

        // 2. FETCH TEMPLATE AND INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            fetch('https://raw.githack.com/ThatMan023/Eyluist/1b438b603536be4ff4264778d2f5e39bd1425f9c/char-base.html')
                .then(response => response.text())
                .then(html => {
                    const container = document.getElementById('header-container');
                    if (container) container.innerHTML = html;
                    
                    initCard(cardData);
                })
                .catch(err => console.error("Error loading template:", err));
        });

        // 3. POPULATION LOGIC 
        function initCard(data) {
            const img = document.getElementById('char-image');
            if (img) img.src = data.logoUrl;
            
            const name = document.getElementById('char-name');
            if (name) name.textContent = data.name;
            
            const gender = document.getElementById('char-gender');
            if (gender) {
                gender.textContent = data.gender;
                gender.style.color = data.genderColor;
            }
            
            const dob = document.getElementById('char-dob');
            if (dob) dob.textContent = data.dob;
            
            const id = document.getElementById('char-id');
            if (id) id.textContent = data.crimsoftId;
            
            const status = document.getElementById('char-status');
            if (status) {
                status.textContent = data.status;
                status.style.color = data.statusColor;
            }
            
            const desc = document.getElementById('char-description');
            if (desc) desc.textContent = data.description;
            
            loadChips(data.csvFile);
        }

        async function loadChips(url) {
            const container = document.getElementById('chip-target');
            if (!container) return;
            
            try {
                const res = await fetch(url);
                const data = await res.text();
                const rows = data.split('\n').slice(1).filter(r => r.trim() !== "");
                rows.forEach(r => {
                    const [t, i, c, l] = r.split(',').map(x => x.trim());
                    const el = document.createElement(l ? 'a' : 'div');
                    if (l) { el.href = l; el.target = "_blank"; }
                    el.className = 'trait-chip';
                    el.style.setProperty('--icon-color', c);
                    el.innerHTML = `<span class="trait-icon material-symbols-outlined">${i}</span><span>${t.toUpperCase()}</span>`;
                    container.appendChild(el);
                });
            } catch(e) { console.error("Error loading CSV:", e); }
        }
    </script>
</body>
</html>
