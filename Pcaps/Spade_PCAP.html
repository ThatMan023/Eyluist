<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
	
	<link rel="stylesheet" href="PCAP_Class.css">

</head>
<body>

    <a href="#Spade" class="card-container" id="characterCard">
        
        <h1 class="card-title">SPADE</h1>
        
        <div class="image-wrapper">
            <img src="https://thatman023.github.io/Eyluist/characters/Spade_CallingCard.png" alt="Spade Character" class="character-icon">
        </div>

        <div class="info-bg">
            <div class="info-collapsible" id="infoCollapsible">
                <div class="info-inner">
                    <div class="info-content-wrapper">
                        
                        <div class="info-row">
                            <span class="material-symbols-outlined icon">credit_card</span>
                            <span class="label">CRID</span>
                            <span class="value">450B.910E - 25VY.13.7SF</span>
                        </div>
                        
                        <div class="info-row">
                            <span class="material-symbols-outlined icon">calendar_today</span>
                            <span class="label">DOB</span>
                            <span class="value">MAY 23RD, 2063</span>
                        </div>
                        
                        <div class="info-row">
                            <span class="material-symbols-outlined icon">info</span>
                            <span class="label">STATUS</span>
                            <span class="value status-okay">OKAY</span>
                        </div>
                        
                        <div class="info-block">
                            <span class="label-small">INFORMATION</span>
                            <p class="description">
                                Spade was created by a Lab in Crimsoft™. He is apart of the 'Suit Family' with his three brothers, Inkheart, Club '28', and Diamond Jack.
                            </p>
                        </div>
								
						<div class="info-block">
                            <span class="label-small">INFORMATION</span><br>
							<div id="chip-target" class="trait-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="toggle-btn" id="toggleBtn">SHOW MORE</button>
        
    </a>

</body>
</html>
<body>

    <script>
	
	
    // =========================================================================
    const CHARACTER_CONFIG = {
      csvName: 'https://thatman023.github.io/Eyluist/characters/Spade_Chips.csv'
    };
    // =========================================================================

  /////////////
	
	document.addEventListener('DOMContentLoaded', () => {
	loadChips();
    const toggleBtn = document.getElementById('toggleBtn');
    const infoCollapsible = document.getElementById('infoCollapsible');
    const cardContainer = document.getElementById('characterCard');

    toggleBtn.addEventListener('click', (e) => {
        // Prevents the button from triggering the parent <a> tag link
        e.preventDefault(); 
        e.stopPropagation();

        // Toggle the grid expansion class
        infoCollapsible.classList.toggle('show');

        // Update button text
        if (infoCollapsible.classList.contains('show')) {
            toggleBtn.textContent = 'SHOW LESS';
        } else {
            toggleBtn.textContent = 'SHOW MORE';
        }
    });
});

/////////


    async function loadChips() {
      const chipContainer = document.getElementById('chip-target');
      if (!chipContainer) return;

      try {
        const response = await fetch(CHARACTER_CONFIG.csvName);
        if (!response.ok) throw new Error(`HTTP network error: status ${response.status}`);
        
        const csvRawData = await response.text();
        const rows = csvRawData.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");

        rows.forEach(row => {
          const [title, icon, color, link] = row.split(',').map(item => item ? item.trim() : '');
          if (!title) return; 
          
          const chip = document.createElement(link ? 'a' : 'div');
          
          if (link) {
            chip.href = link;
            chip.target = "_blank"; 
            chip.style.cursor = "pointer";
          }

          chip.classList.add('trait-chip');
          chip.style.setProperty('--icon-color', color || '#555');
          
          chip.innerHTML = `
            <div class="trait-icon material-symbols-outlined" style="background-color: ${color || '#555'}">${icon || 'label'}</div>
            <span>${title.toUpperCase()}</span>
          `;
          
          chipContainer.appendChild(chip);
        });
      } catch (error) {
        console.error("Could not read CSV data file source:", error);
        chipContainer.innerHTML = "<small style='color:#ff5983;'>CSV ERROR</small>";
      }
    }

    </script>
</body>

</html>
